<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🛍️ Do'konim</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  
  :root {
    --primary: #FF6B35;
    --primary-dark: #e55a26;
    --primary-light: #FF8C42;
    --bg: #F7F8FC;
    --card: #FFFFFF;
    --text: #1A202C;
    --text-light: #718096;
    --border: #E2E8F0;
    --shadow: 0 2px 8px rgba(0,0,0,0.05);
    --shadow-lg: 0 4px 20px rgba(0,0,0,0.1);
    --radius: 16px;
    --radius-sm: 12px;
    --success: #48BB78;
    --warning: #F6AD55;
    --danger: #F56565;
  }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 80px;
    overflow-x: hidden;
  }
  
  /* Header */
  .header {
    background: var(--card);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .logo {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .cart-icon {
    position: relative;
    cursor: pointer;
    background: var(--bg);
    padding: 10px 14px;
    border-radius: 50px;
    font-weight: 600;
    transition: transform 0.2s;
  }
  
  .cart-icon:active {
    transform: scale(0.95);
  }
  
  .cart-count {
    position: absolute;
    top: -5px;
    right: -5px;
    background: var(--primary);
    color: white;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  
  /* Search */
  .search-box {
    padding: 16px 20px;
  }
  
  .search-input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: 50px;
    font-size: 15px;
    outline: none;
    background: var(--card);
    transition: all 0.2s;
  }
  
  .search-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
  }
  
  /* Categories */
  .categories {
    padding: 8px 20px;
    overflow-x: auto;
    white-space: nowrap;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  
  .categories::-webkit-scrollbar {
    display: none;
  }
  
  .category-btn {
    display: inline-block;
    padding: 10px 24px;
    margin-right: 10px;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .category-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
    box-shadow: 0 4px 12px rgba(255,107,53,0.3);
  }
  
  /* Products Grid */
  .products {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    padding: 16px 20px;
  }
  
  .product-card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  
  .product-card:active {
    transform: scale(0.98);
  }
  
  .product-images {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
  }
  
  .product-main-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }
  
  .product-card:hover .product-main-image {
    transform: scale(1.05);
  }
  
  .image-counter {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 4px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  
  .product-info {
    padding: 12px;
  }
  
  .product-name {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  
  .product-price {
    font-size: 18px;
    font-weight: 800;
    color: var(--primary);
    margin-bottom: 12px;
  }
  
  .add-btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  
  .add-btn:active {
    opacity: 0.8;
  }
  
  .qty-control {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  
  .qty-btn {
    flex: 1;
    padding: 8px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
  }
  
  .qty-num {
    font-size: 16px;
    font-weight: 700;
    min-width: 40px;
    text-align: center;
  }
  
  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    animation: fadeIn 0.3s;
  }
  
  .modal-overlay.show {
    display: flex;
    align-items: flex-end;
  }
  
  .modal-content {
    background: var(--card);
    width: 100%;
    max-height: 85vh;
    border-radius: 24px 24px 0 0;
    overflow: hidden;
    animation: slideUp 0.3s ease-out;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  
  .modal-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .modal-header h3 {
    font-size: 20px;
    font-weight: 800;
  }
  
  .close-modal {
    background: var(--bg);
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .cart-items {
    max-height: 50vh;
    overflow-y: auto;
    padding: 16px;
  }
  
  .cart-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    margin-bottom: 10px;
  }
  
  .cart-item-image {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    object-fit: cover;
  }
  
  .cart-item-info {
    flex: 1;
  }
  
  .cart-item-name {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 4px;
  }
  
  .cart-item-price {
    font-size: 13px;
    color: var(--primary);
    font-weight: 600;
  }
  
  .cart-item-remove {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--danger);
    padding: 8px;
  }
  
  .cart-footer {
    padding: 20px;
    border-top: 1px solid var(--border);
  }
  
  .cart-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    font-size: 18px;
  }
  
  .cart-total strong {
    font-size: 24px;
    color: var(--primary);
  }
  
  /* Order Form */
  .order-form {
    padding: 20px;
    display: none;
  }
  
  .order-form.show {
    display: block;
  }
  
  .form-group {
    margin-bottom: 16px;
  }
  
  .form-label {
    display: block;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-light);
  }
  
  .form-input,
  .form-textarea {
    width: 100%;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px;
    outline: none;
    background: var(--card);
  }
  
  .form-input:focus,
  .form-textarea:focus {
    border-color: var(--primary);
  }
  
  .form-textarea {
    resize: vertical;
    min-height: 80px;
    font-family: inherit;
  }
  
  .checkout-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 16px;
    transition: transform 0.2s;
  }
  
  .checkout-btn:active {
    transform: scale(0.98);
  }
  
  /* Success Modal */
  .success-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 1100;
    align-items: center;
    justify-content: center;
  }
  
  .success-modal.show {
    display: flex;
  }
  
  .success-card {
    background: var(--card);
    padding: 40px 30px;
    border-radius: 24px;
    text-align: center;
    max-width: 300px;
    width: 90%;
    animation: popIn 0.4s;
  }
  
  @keyframes popIn {
    from {
      transform: scale(0.5);
      opacity: 0;
    }
    to {
      transform: scale(1);
      opacity: 1;
    }
  }
  
  .success-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  
  .success-title {
    font-size: 24px;
    font-weight: 800;
    color: var(--success);
    margin-bottom: 8px;
  }
  
  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }
  
  .empty-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  
  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
  }
  
  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">🛍️ DO'KON</div>
  <div class="cart-icon" onclick="openCart()">
    🛒
    <span class="cart-count" id="cartCount">0</span>
  </div>
</div>

<!-- Search -->
<div class="search-box">
  <input type="text" class="search-input" placeholder="🔍 Mahsulot qidirish..." id="searchInput" oninput="filterProducts()">
</div>

<!-- Categories -->
<div class="categories" id="categories"></div>

<!-- Products -->
<div class="products" id="products"></div>

<!-- Cart Modal -->
<div class="modal-overlay" id="cartModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>🛒 Savatcha</h3>
      <button class="close-modal" onclick="closeCart()">&times;</button>
    </div>
    
    <div class="cart-items" id="cartItems"></div>
    
    <div class="order-form" id="orderForm">
      <div class="form-group">
        <label class="form-label">📍 Yetkazib berish manzili *</label>
        <input type="text" class="form-input" id="addressInput" placeholder="Toshkent shahar, Yunusobod, 5-kvartal...">
      </div>
      <div class="form-group">
        <label class="form-label">💬 Izoh (ixtiyoriy)</label>
        <textarea class="form-textarea" id="noteInput" placeholder="Maxsus talablar, qo'shimcha ma'lumot..."></textarea>
      </div>
      <button class="checkout-btn" onclick="placeOrder()">✅ Zakaz berish</button>
    </div>
    
    <div class="cart-footer" id="cartFooter">
      <div class="cart-total">
        <span>Jami:</span>
        <strong id="cartTotal">0 so'm</strong>
      </div>
      <button class="checkout-btn" onclick="showOrderForm()">📝 Rasmiylashtirish</button>
    </div>
  </div>
</div>

<!-- Success Modal -->
<div class="success-modal" id="successModal">
  <div class="success-card">
    <div class="success-icon">🎉</div>
    <div class="success-title">Rahmat!</div>
    <div class="success-text" style="margin-top: 8px; color: var(--text-light);">
      Zakazingiz muvaffaqiyatli qabul qilindi!<br>
      Tez orada siz bilan bog'lanamiz.
    </div>
  </div>
</div>

<script>
// Telegram Web App
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.enableClosingConfirmation();

// Global variables
let products = [];
let cart = {};
let currentCategory = 'all';

// Load products
async function loadProducts() {
  try {
    const response = await fetch('/webapp_products.json?' + Date.now());
    products = await response.json();
    renderCategories();
    renderProducts();
  } catch (error) {
    console.error('Error loading products:', error);
    document.getElementById('products').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div style="font-weight: 600; margin-bottom: 8px;">Mahsulotlar yuklanmadi</div>
        <div style="font-size: 14px;">Internet aloqasini tekshiring</div>
      </div>
    `;
  }
}

// Render categories
function renderCategories() {
  const categories = ['all', ...new Set(products.map(p => p.category))];
  const container = document.getElementById('categories');
  container.innerHTML = categories.map(cat => `
    <button class="category-btn ${cat === currentCategory ? 'active' : ''}" onclick="filterByCategory('${cat}')">
      ${cat === 'all' ? '🌟 Barchasi' : cat}
    </button>
  `).join('');
}

// Filter by category
function filterByCategory(category) {
  currentCategory = category;
  renderCategories();
  renderProducts();
  if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

// Filter products
function filterProducts() {
  renderProducts();
}

// Render products
function renderProducts() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = products;
  
  if (currentCategory !== 'all') {
    filtered = filtered.filter(p => p.category === currentCategory);
  }
  
  if (search) {
    filtered = filtered.filter(p => 
      p.name.toLowerCase().includes(search) ||
      (p.description && p.description.toLowerCase().includes(search))
    );
  }
  
  const container = document.getElementById('products');
  
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="empty-icon">🔍</div>
        <div style="font-weight: 600; margin-bottom: 8px;">Mahsulot topilmadi</div>
        <div style="font-size: 14px;">Boshqa so'z bilan qidirib ko'ring</div>
      </div>
    `;
    return;
  }
  
  container.innerHTML = filtered.map(product => {
    const qty = cart[product.id] || 0;
    const mainPhoto = product.photos && product.photos.length > 0 ? product.photos[0] : null;
    const photoCount = product.photos ? product.photos.length : 0;
    
    return `
      <div class="product-card">
        <div class="product-images">
          ${mainPhoto ? 
            `<img class="product-main-image" src="${mainPhoto}" alt="${product.name}" onclick="showProductImages(${product.id})">` :
            `<div class="product-main-image" style="display: flex; align-items: center; justify-content: center; font-size: 48px; background: linear-gradient(135deg, #f5f5f5, #e5e5e5);">
              ${getCategoryIcon(product.category)}
            </div>`
          }
          ${photoCount > 1 ? `<div class="image-counter">📸 ${photoCount}</div>` : ''}
        </div>
        <div class="product-info">
          <div class="product-name">${escapeHtml(product.name)}</div>
          <div class="product-price">${formatPrice(product.price)} so'm</div>
          ${qty === 0 ? 
            `<button class="add-btn" onclick="addToCart(${product.id})">➕ Savatga</button>` :
            `<div class="qty-control">
              <button class="qty-btn" onclick="updateQuantity(${product.id}, -1)">-</button>
              <span class="qty-num">${qty}</span>
              <button class="qty-btn" onclick="updateQuantity(${product.id}, 1)">+</button>
            </div>`
          }
        </div>
      </div>
    `;
  }).join('');
}

// Show product images
function showProductImages(productId) {
  const product = products.find(p => p.id === productId);
  if (product && product.photos && product.photos.length > 0) {
    let currentImage = 0;
    const imagesList = product.photos.map(p => p).join(',');
    tg.showPopup({
      title: product.name,
      message: `${product.photos.length} ta rasm mavjud\nNarxi: ${formatPrice(product.price)} so'm`,
      buttons: [{type: 'ok'}]
    });
  }
}

// Get category icon
function getCategoryIcon(category) {
  const icons = {
    '👗 Kiyim': '👗', '👟 Poyabzal': '👟', '💄 Kosmetika': '💄',
    '📱 Elektronika': '📱', '🏠 Uy jihozlari': '🏠', '🍕 Oziq-ovqat': '🍕'
  };
  return icons[category] || '🛍️';
}

// Format price
function formatPrice(price) {
  return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
}

// Escape HTML
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Add to cart
function addToCart(productId) {
  cart[productId] = (cart[productId] || 0) + 1;
  updateCartUI();
  renderProducts();
  if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

// Update quantity
function updateQuantity(productId, delta) {
  const newQty = (cart[productId] || 0) + delta;
  if (newQty <= 0) {
    delete cart[productId];
  } else {
    cart[productId] = newQty;
  }
  updateCartUI();
  renderProducts();
  if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

// Update cart UI
function updateCartUI() {
  const total = Object.values(cart).reduce((a, b) => a + b, 0);
  document.getElementById('cartCount').textContent = total;
  
  let cartTotal = 0;
  const cartItemsHtml = Object.entries(cart).map(([id, qty]) => {
    const product = products.find(p => p.id == id);
    if (!product) return '';
    const subtotal = product.price * qty;
    cartTotal += subtotal;
    const mainPhoto = product.photos && product.photos.length > 0 ? product.photos[0] : null;
    
    return `
      <div class="cart-item">
        ${mainPhoto ? `<img class="cart-item-image" src="${mainPhoto}" alt="${product.name}">` : 
          `<div class="cart-item-image" style="display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f5f5f5, #e5e5e5); font-size: 30px;">${getCategoryIcon(product.category)}</div>`}
        <div class="cart-item-info">
          <div class="cart-item-name">${escapeHtml(product.name)}</div>
          <div class="cart-item-price">${qty} x ${formatPrice(product.price)} = ${formatPrice(subtotal)} so'm</div>
        </div>
        <button class="cart-item-remove" onclick="removeFromCart(${id})">🗑️</button>
      </div>
    `;
  }).join('');
  
  document.getElementById('cartItems').innerHTML = cartItemsHtml || '<div class="empty-state" style="padding: 40px;">Savat bo\'sh</div>';
  document.getElementById('cartTotal').textContent = formatPrice(cartTotal) + ' so\'m';
}

// Remove from cart
function removeFromCart(productId) {
  delete cart[productId];
  updateCartUI();
  renderProducts();
  if (Object.keys(cart).length === 0) {
    closeCart();
  }
  if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

// Open cart
function openCart() {
  if (Object.keys(cart).length === 0) {
    tg.showPopup({ message: '🛒 Savat bo\'sh! Mahsulot qo\'shing.' });
    return;
  }
  
  document.getElementById('orderForm').classList.remove('show');
  document.getElementById('cartFooter').style.display = '';
  document.getElementById('cartModal').classList.add('show');
}

// Close cart
function closeCart() {
  document.getElementById('cartModal').classList.remove('show');
}

// Show order form
function showOrderForm() {
  document.getElementById('cartItems').style.display = 'none';
  document.getElementById('cartFooter').style.display = 'none';
  document.getElementById('orderForm').classList.add('show');
}

// Place order
function placeOrder() {
  const address = document.getElementById('addressInput').value.trim();
  if (!address) {
    tg.showPopup({ 
      title: 'Manzil kiritilmagan',
      message: 'Iltimos, yetkazib berish manzilini kiriting!',
      buttons: [{type: 'ok'}]
    });
    document.getElementById('addressInput').focus();
    return;
  }
  
  const items = Object.entries(cart).map(([id, qty]) => {
    const product = products.find(p => p.id == id);
    return {
      id: product.id,
      name: product.name,
      price: product.price,
      qty: qty
    };
  });
  
  const orderData = {
    items: items,
    total: Object.entries(cart).reduce((sum, [id, qty]) => {
      const product = products.find(p => p.id == id);
      return sum + (product ? product.price * qty : 0);
    }, 0),
    address: address,
    note: document.getElementById('noteInput').value.trim()
  };
  
  // Send to Telegram
  tg.sendData(JSON.stringify(orderData));
  
  // Clear cart
  cart = {};
  updateCartUI();
  renderProducts();
  closeCart();
  
  // Show success
  document.getElementById('successModal').classList.add('show');
  setTimeout(() => {
    document.getElementById('successModal').classList.remove('show');
  }, 3000);
  
  if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

// Close modal on outside click
document.getElementById('cartModal').addEventListener('click', function(e) {
  if (e.target === this) {
    closeCart();
  }
});

// Load products
loadProducts();
</script>
</body>
